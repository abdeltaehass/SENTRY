# SENTRY default configuration.
# Override per-experiment by copying this file and passing --config <path>.

project:
  name: sentry
  seed: 42

data:
  # Produced by your ingestion/preprocessing pipeline (see data/README.md).
  raw_dir: data/raw/incidents
  processed_dir: data/processed/incidents
  # Each split is a JSONL of {"id": ..., "image_path": ..., "report": ...}
  # (optionally "image_paths" for multi-camera scenes).
  train_split: data/processed/incidents/train.jsonl
  val_split: data/processed/incidents/val.jsonl
  test_split: data/processed/incidents/test.jsonl
  # Text field the model should generate.
  target: report
  max_target_tokens: 160
  # Leakage-safe split unit: every frame from one camera/location stays in one split.
  group_key: camera_id        # camera_id | location_id
  # Security footage is wide; pad to square instead of distorting to the model's input.
  letterbox: true
  frames:                     # video -> frame sampling (only if ingesting clips)
    every_n_frames: 30        # ~1 fps at a 30 fps source
    max_frames_per_clip: 16

model:
  # Adapt an existing open VLM with LoRA.
  approach: blip2_lora        # one of: blip2_lora | clip_llm | smolvlm_lora
  base_model: Salesforce/blip2-opt-2.7b
  # Prompt template — the model is prompt-conditioned (masked in the loss during
  # training; passed to generate at inference) so the two stay consistent.
  prompt: "Describe what is happening in this frame, including any anomalies or notable events, in a concise factual report."
  dtype: bf16                 # use fp16/bf16 on MPS; QLoRA(4-bit) only on CUDA

  lora:
    r: 16
    alpha: 32
    dropout: 0.05
    # LoRA on the OPT decoder attention (these names match only the OPT LLM,
    # not the ViT/Q-Former, so adapters land only on the language model).
    target_modules: ["q_proj", "k_proj", "v_proj", "out_proj"]
    # Fully train + save the projection that maps Q-Former output into the LLM.
    modules_to_save: ["language_projection"]

training:
  output_dir: outputs/incident_lora
  epochs: 5
  max_steps: null             # cap optimizer steps (CLI --max-steps overrides)
  batch_size: 2
  grad_accum: 8
  lr: 1.0e-4
  warmup_ratio: 0.03
  weight_decay: 0.01
  smoke_test: false
  smoke_subset: 32

eval:
  metrics: ["bleu", "rougeL", "meteor", "event_f1"]
  num_beams: 4
  max_new_tokens: 96
  repetition_penalty: 1.5     # curb repeated phrases
  no_repeat_ngram_size: 3

wandb:
  enabled: true
  project: sentry-incidents
  entity: null
  mode: online                # online | offline | disabled
